<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="shortcut icon" type="image/x-icon" href="/media/checklist.ico">
    <link href="/output.css" rel="stylesheet" />
  </head>
  <body class="bg-slate-800 h-screen">
    <nav id="navbar" class="fixed top-0 left-0 right-0 bg-gray-950 h-16"></nav>

    <div id="notification" class="fixed top-20 right-0 left-0"></div>

    <div
      class="flex pt-16 h-full max-w-7xl mx-auto justify-center items-center px-4"
    >
      <div class="hidden lg:flex w-2/4 justify-center items-center px-4">
        <img class="w-3/4" src="/media/signup.svg" alt="gif de signup">
      </div>
      <form
        id="form"
        class="flex pt-6 flex-col gap-4 bg-gray-950 p-4 rounded-lg text-lg shadow-lg lg:w-2/4"
      >
        <div class="flex flex-col gap-2">
          <label class="font-bold text-white" for="name-input"
            >Nombre <span class="text-red-500">*</span></label
          >
          <input
            id="name-input"
            type="text"
            name="name-input"
            autocomplete="off"
            placeholder="Ingrese su nombre"
            class="rounded-lg p-2 bg-zinc-200 focus:outline-indigo-700"
          />
          <p class="text-sm text-zinc-400" id="information">
            Debe incluir minimo 3 caracteres maximo 16 caracteres, solo letras y espacios en blanco.
          </p>
        </div>
        <div class="flex flex-col gap-2">
          <label class="font-bold text-white" for="email-input"
            >Email <span class="text-red-500">*</span></label
          >
          <input
            id="email-input"
            type="text"
            name="email-input"
            autocomplete="off"
            placeholder="ejemplo@gmail.com"
            class="rounded-lg p-2 bg-zinc-200 focus:outline-indigo-700"
          />
          <p class="text-sm text-zinc-400" id="information">El correo debe seguir el siguiente formato: ejemplo@gmail.com</p>
        </div>
        <div class="flex flex-col gap-2">
          <label class="font-bold text-white" for="password-input"
            >Contraseña <span class="text-red-500">*</span></label
          >
          <input
            id="password-input"
            type="password"
            name="password-input"
            autocomplete="off"
            placeholder="Ingrese su contraseña"
            class="rounded-lg p-2 bg-zinc-200 focus:outline-indigo-700"
          />
          <p class="text-sm text-zinc-400" id="information">
            Debe incluir minimo 6 caracteres maximo 12 caracteres, minimo una letra mayuscula
          </p>
        </div>
        <div class="flex flex-col gap-2">
          <label class="font-bold text-white" for="password-input"
            >Confirmar contraseña
            <span class="text-red-500">*</span></label
          >
          <input
            id="match-input"
            type="password"
            name="match-input"
            autocomplete="off"
            placeholder="Confirme su contraseña"
            class="rounded-lg p-2 bg-zinc-200 focus:outline-indigo-700"
          />
          <p class="text-sm text-zinc-400 " id="information">Debe coincidir con la contraseña anterior</p>
        </div>
        <button
          id="form-btn"
          type="submit"
          class="bg-orange-500  hover:bg-orange-600 py-2 px-4 rounded-lg font-bold text-white text-center transition ease-in-out disabled:opacity-40 disabled:cursor-not-allowed"
          disabled
        >
          Registrar
        </button>
      </form>
    </div>
    <script src="/components/nav.js"></script>
    <script type="module" src="index.js"></script>
    <script type="module" src="/components/notification.js"></script>
  </body>
</html>
