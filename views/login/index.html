<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="/styles/output.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="shortcut icon" type="image/x-icon" href="/media/checklist.ico">

  </head>
  <body class="bg-slate-800 h-screen">
    <nav id="navbar" class="fixed top-0 left-0 right-0 bg-slate-950 h-16"></nav>
    <div
      class="bg-slate-800 flex pt-16 h-screen max-w-7xl mx-auto justify-center items-center px-4"
    >
      <div class="hidden lg:flex w-2/4 justify-center items-center px-4">
        <img class="w-3/4" src="/media/login.svg" alt="gif de login">
      </div>
      <form id="form"
        class="flex pt-6 flex-col gap-4 bg-gray-950 p-4 rounded-lg text-lg shadow-lg w-full md:w-9/12 lg:w-2/4"
      >
        <div class="flex flex-col gap-2">
          <label class="font-bold text-white" for="email-input"
            >Email <span class="text-red-500">*</span></label
          >
          <input
            id="email-input"
            type="text"
            name="email-input"
            autocomplete="off"
            placeholder="Ingrese su correo electronico"
            class="rounded-lg p-2 bg-zinc-200 focus:outline-indigo-700"
          />
        </div>
        <div class="flex flex-col gap-2">
          <label class="font-bold text-white" for="password-input"
            >Contraseña <span class="text-red-500">*</span></label
          >
          <input
            id="password-input"
            type="password"
            name="password-input"
            autocomplete="off"
            placeholder="Ingrese su contraseña"
            class="rounded-lg p-2 bg-zinc-200 focus:outline-indigo-700"
          />
          <p id="error-text" class="text-sm text-red-600"></p>
        </div>
        <button
          id="form-btn"
          class="bg-orange-500 py-2 px-4 rounded-lg font-bold text-white hover:bg-orange-600 text-center transition ease-in-out disabled:opacity-40 disabled:cursor-not-allowed"
        >
          Iniciar sesión
        </button>
      </form>
    </div>
    <script src="/components/nav.js"></script>
  </body>
</html>
